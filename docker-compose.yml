version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: connectly-db
    environment:
      POSTGRES_USER: connectly_user
      POSTGRES_PASSWORD: connectly_password
      POSTGRES_DB: connectly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectly_user -d connectly"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: connectly-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://connectly_user:connectly_password@postgres:5432/connectly
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      API_URL: http://api:3000
      VITE_API_URL: http://localhost:3000
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run dev & pnpm --filter @workspace/social run dev"

volumes:
  postgres_data:
