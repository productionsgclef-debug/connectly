kind = "web"
previewPath = "/"
title = "Connectly"
version = "1.0.0"
id = "artifacts/social"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24941

[services.development]
run = "pnpm --filter @workspace/social run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/social", "run", "build" ]
publicDir = "artifacts/social/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24941"
BASE_PATH = "/"
